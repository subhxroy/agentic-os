<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AgentOS Marketplace</title>
    <style>
        :root { --bg: #0d1117; --card: #161b22; --border: #30363d; --text: #c9d1d9; --muted: #8b949e; --accent: #58a6ff; --green: #3fb950; --orange: #d29922; --red: #f85149; --purple: #bc8cff; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); line-height: 1.6; }
        .nav { position: fixed; top: 0; left: 0; right: 0; background: var(--card); border-bottom: 1px solid var(--border); padding: 12px 24px; display: flex; align-items: center; gap: 24px; z-index: 100; }
        .nav-brand { font-size: 18px; font-weight: 700; color: var(--accent); text-decoration: none; }
        .nav-links { display: flex; gap: 20px; }
        .nav-links a { color: var(--muted); text-decoration: none; font-size: 14px; }
        .nav-links a:hover { color: var(--text); }
        .search-bar { flex: 1; max-width: 400px; position: relative; }
        .search-bar input { width: 100%; padding: 8px 12px; border-radius: 6px; border: 1px solid var(--border); background: var(--bg); color: var(--text); font-size: 14px; }
        .container { max-width: 1200px; margin: 0 auto; padding: 80px 24px 40px; }
        .hero { text-align: center; padding: 40px 0; }
        .hero h1 { font-size: 36px; margin-bottom: 8px; }
        .hero p { color: var(--muted); font-size: 18px; }
        .stats { display: flex; gap: 32px; justify-content: center; margin: 24px 0; }
        .stat { text-align: center; }
        .stat-num { font-size: 28px; font-weight: 700; color: var(--accent); }
        .stat-label { font-size: 13px; color: var(--muted); }
        .filters { display: flex; gap: 8px; margin-bottom: 24px; flex-wrap: wrap; }
        .filter-btn { padding: 6px 16px; border-radius: 20px; border: 1px solid var(--border); background: transparent; color: var(--muted); cursor: pointer; font-size: 13px; }
        .filter-btn.active { background: var(--accent); color: #fff; border-color: var(--accent); }
        .filter-btn:hover { border-color: var(--accent); color: var(--text); }
        .sort-bar { display: flex; gap: 12px; align-items: center; margin-bottom: 16px; }
        .sort-bar select { padding: 6px 12px; border-radius: 6px; border: 1px solid var(--border); background: var(--card); color: var(--text); font-size: 13px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 16px; }
        .pkg-card { background: var(--card); border: 1px solid var(--border); border-radius: 8px; padding: 20px; cursor: pointer; transition: border-color 0.2s; }
        .pkg-card:hover { border-color: var(--accent); }
        .pkg-header { display: flex; align-items: start; gap: 12px; margin-bottom: 12px; }
        .pkg-icon { width: 48px; height: 48px; border-radius: 8px; background: var(--border); display: flex; align-items: center; justify-content: center; font-size: 20px; flex-shrink: 0; }
        .pkg-name { font-size: 16px; font-weight: 600; }
        .pkg-author { font-size: 12px; color: var(--muted); }
        .pkg-desc { font-size: 14px; color: var(--muted); margin-bottom: 12px; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
        .pkg-meta { display: flex; gap: 16px; font-size: 12px; color: var(--muted); }
        .pkg-rating { color: var(--orange); }
        .pkg-tag { display: inline-block; padding: 2px 8px; border-radius: 12px; background: rgba(88,166,255,0.1); color: var(--accent); font-size: 11px; margin-right: 4px; }
        .badge { display: inline-block; padding: 2px 8px; border-radius: 12px; font-size: 11px; font-weight: 600; }
        .badge-free { background: rgba(63,185,80,0.15); color: var(--green); }
        .badge-paid { background: rgba(210,153,34,0.15); color: var(--orange); }
        .badge-featured { background: rgba(188,140,255,0.15); color: var(--purple); }
        .detail-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 200; }
        .detail-overlay.show { display: flex; align-items: center; justify-content: center; }
        .detail-modal { background: var(--card); border: 1px solid var(--border); border-radius: 12px; max-width: 640px; width: 90%; max-height: 80vh; overflow-y: auto; padding: 32px; }
        .detail-modal h2 { margin-bottom: 4px; }
        .detail-modal .close { float: right; background: none; border: none; color: var(--muted); font-size: 24px; cursor: pointer; }
        .stars { color: var(--orange); letter-spacing: 2px; }
        .review { padding: 12px 0; border-bottom: 1px solid var(--border); }
        .review-header { display: flex; gap: 8px; align-items: center; }
        .review-rating { color: var(--orange); font-size: 14px; }
        .review-user { font-size: 12px; color: var(--muted); }
        .review-content { font-size: 14px; margin-top: 4px; }
        .btn { padding: 8px 16px; border-radius: 6px; border: none; cursor: pointer; font-size: 14px; font-weight: 600; }
        .btn-primary { background: var(--accent); color: #fff; }
        .btn-outline { background: transparent; border: 1px solid var(--border); color: var(--text); }
        .btn:hover { opacity: 0.9; }
        .empty { text-align: center; padding: 60px 20px; color: var(--muted); }
        .version-list { margin-top: 16px; }
        .version-item { padding: 8px 0; border-bottom: 1px solid var(--border); font-size: 14px; }
        .version-num { font-weight: 600; }
        .version-date { color: var(--muted); font-size: 12px; }
    </style>
</head>
<body>
    <nav class="nav">
        <a href="/marketplace" class="nav-brand">Marketplace</a>
        <div class="nav-links">
            <a href="/">Agent</a>
            <a href="/developer">Developer</a>
        </div>
        <div class="search-bar">
            <input type="text" id="search-input" placeholder="Search agents, tools, plugins...">
        </div>
    </nav>

    <div class="container">
        <div class="hero">
            <h1>AgentOS Marketplace</h1>
            <p>Discover agents, tools, and plugins built by the community.</p>
            <div class="stats" id="stats"></div>
        </div>

        <div class="filters" id="filters"></div>

        <div class="sort-bar">
            <span style="font-size:13px;color:var(--muted)">Sort by:</span>
            <select id="sort-select">
                <option value="rating">Top Rated</option>
                <option value="installs">Most Installed</option>
                <option value="newest">Newest</option>
                <option value="downloads">Most Downloads</option>
            </select>
        </div>

        <div class="grid" id="packages"></div>
        <div class="empty" id="empty" style="display:none">No packages found.</div>
    </div>

    <div class="detail-overlay" id="detail-overlay">
        <div class="detail-modal" id="detail-modal"></div>
    </div>

    <script>
        const API = '';
        let currentCategory = null;
        let currentQuery = '';

        async function loadStats() {
            const resp = await fetch(`${API}/api/marketplace/stats`);
            const data = await resp.json();
            document.getElementById('stats').innerHTML = `
                <div class="stat"><div class="stat-num">${data.total_packages}</div><div class="stat-label">Packages</div></div>
                <div class="stat"><div class="stat-num">${data.categories.length}</div><div class="stat-label">Categories</div></div>
            `;
            const filters = document.getElementById('filters');
            let html = '<button class="filter-btn active" onclick="filterCategory(null)">All</button>';
            for (const cat of data.categories) {
                html += `<button class="filter-btn" onclick="filterCategory('${cat.category}')">${cat.category} (${cat.count})</button>`;
            }
            filters.innerHTML = html;
        }

        async function loadPackages() {
            const sort = document.getElementById('sort-select').value;
            let url = `${API}/api/marketplace?sort=${sort}&limit=50`;
            if (currentCategory) url += `&category=${currentCategory}`;
            if (currentQuery) url += `&q=${encodeURIComponent(currentQuery)}`;
            const resp = await fetch(url);
            const packages = await resp.json();
            const grid = document.getElementById('packages');
            const empty = document.getElementById('empty');
            if (!packages.length) { grid.innerHTML = ''; empty.style.display = 'block'; return; }
            empty.style.display = 'none';
            grid.innerHTML = packages.map(p => `
                <div class="pkg-card" onclick="showDetail('${p.id}')">
                    <div class="pkg-header">
                        <div class="pkg-icon">${p.icon_url ? '<img src="'+p.icon_url+'" width="48">' : p.display_name[0]}</div>
                        <div>
                            <div class="pkg-name">${p.display_name} ${p.featured ? '<span class="badge badge-featured">Featured</span>' : ''}</div>
                            <div class="pkg-author">by ${p.publisher_email || 'unknown'}</div>
                        </div>
                    </div>
                    <div class="pkg-desc">${p.description || ''}</div>
                    <div style="margin-bottom:8px">${(p.tags||[]).map(t => '<span class="pkg-tag">'+t+'</span>').join('')}</div>
                    <div class="pkg-meta">
                        <span class="pkg-rating">${'★'.repeat(Math.round(p.rating_avg||0))}${'☆'.repeat(5-Math.round(p.rating_avg||0))} ${p.rating_avg||0}</span>
                        <span>${p.installs_count||0} installs</span>
                        <span>${p.downloads_total||0} downloads</span>
                    </div>
                </div>
            `).join('');
        }

        async function showDetail(id) {
            const resp = await fetch(`${API}/api/marketplace/packages/${id}`);
            const pkg = await resp.json();
            const stars = '★'.repeat(Math.round(pkg.rating_avg||0)) + '☆'.repeat(5-Math.round(pkg.rating_avg||0));
            document.getElementById('detail-modal').innerHTML = `
                <button class="close" onclick="closeDetail()">&times;</button>
                <h2>${pkg.display_name}</h2>
                <p style="color:var(--muted);margin-bottom:16px">by ${pkg.publisher_email || 'unknown'} &middot; ${pkg.category}</p>
                <div style="margin-bottom:16px">${(pkg.tags||[]).map(t => '<span class="pkg-tag">'+t+'</span>').join('')}</div>
                <p style="margin-bottom:16px">${pkg.description || ''}</p>
                <div style="display:flex;gap:16px;margin-bottom:20px">
                    <span class="stars">${stars} ${pkg.rating_avg||0} (${pkg.rating_count||0} reviews)</span>
                    <span>${pkg.installs_count||0} installs</span>
                </div>
                ${pkg.long_description ? '<p style="margin-bottom:16px">'+pkg.long_description+'</p>' : ''}
                <h3>Versions</h3>
                <div class="version-list">
                    ${(pkg.versions||[]).map(v => `<div class="version-item"><span class="version-num">v${v.version}</span> <span class="version-date">${v.created_at?.split('T')[0]||''}</span> ${v.changelog?'— '+v.changelog:''}</div>`).join('') || '<p style="color:var(--muted);font-size:14px">No versions published.</p>'}
                </div>
                <h3 style="margin-top:20px">Reviews</h3>
                <div>${(pkg.reviews||[]).map(r => `<div class="review"><div class="review-header"><span class="review-rating">${'★'.repeat(r.rating)}</span><span class="review-user">${r.user_email||'anon'}</span></div>${r.title?'<strong>'+r.title+'</strong>':''}<div class="review-content">${r.content||''}</div></div>`).join('') || '<p style="color:var(--muted);font-size:14px">No reviews yet.</p>'}</div>
            `;
            document.getElementById('detail-overlay').classList.add('show');
        }

        function closeDetail() {
            document.getElementById('detail-overlay').classList.remove('show');
        }

        function filterCategory(cat) {
            currentCategory = cat;
            document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
            event.target.classList.add('active');
            loadPackages();
        }

        document.getElementById('search-input').addEventListener('keyup', (e) => {
            currentQuery = e.target.value;
            loadPackages();
        });
        document.getElementById('sort-select').addEventListener('change', loadPackages);
        document.getElementById('detail-overlay').addEventListener('click', (e) => {
            if (e.target.id === 'detail-overlay') closeDetail();
        });

        loadStats();
        loadPackages();
    </script>
</body>
</html>
