<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self' 'unsafe-inline' 'unsafe-eval' http://127.0.0.1:* ws://127.0.0.1:*; connect-src 'self' http://127.0.0.1:* ws://127.0.0.1:*; media-src 'self' blob:;">
    <title>AgentOS</title>
    <style>
        :root {
            --bg-base: #0a0015;
            --bg-surface: #110022;
            --bg-elevated: #1a0033;
            --accent: #7c3aed;
            --accent-dim: #5b21b6;
            --accent-glow: rgba(124, 58, 237, 0.35);
            --accent-bright: #a78bfa;
            --text-primary: #e2e0ea;
            --text-secondary: #7a7090;
            --text-dim: #4a4060;
            --error: #ef4444;
            --success: #10b981;
            --warning: #f59e0b;
            --font-main: 'Segoe UI', system-ui, -apple-system, sans-serif;
            --font-mono: 'Cascadia Code', 'Consolas', monospace;
        }
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { height: 100%; overflow: hidden; background: var(--bg-base); color: var(--text-primary); font-family: var(--font-main); }
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--accent-dim); border-radius: 2px; }

        /* Title bar (frameless window) */
        .titlebar {
            display: flex; align-items: center; justify-content: space-between;
            height: 32px; padding: 0 8px 0 12px;
            background: var(--bg-surface); border-bottom: 1px solid rgba(124,58,237,0.1);
            -webkit-app-region: drag; user-select: none;
        }
        .titlebar-title { font-size: 12px; color: var(--text-secondary); font-weight: 500; }
        .titlebar-buttons { display: flex; gap: 2px; -webkit-app-region: no-drag; }
        .titlebar-btn {
            width: 36px; height: 28px; display: flex; align-items: center; justify-content: center;
            background: none; border: none; color: var(--text-secondary); cursor: pointer;
            border-radius: 4px; font-size: 14px; transition: background 0.15s;
        }
        .titlebar-btn:hover { background: rgba(124,58,237,0.15); }
        .titlebar-btn.close:hover { background: var(--error); color: white; }

        /* Main layout */
        .app { display: flex; flex-direction: column; height: calc(100vh - 32px); }
        .main-content { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; position: relative; }

        /* Orb */
        .orb-container { position: relative; margin-bottom: 32px; }
        .orb {
            width: 100px; height: 100px; border-radius: 50%;
            background: radial-gradient(circle at 40% 40%, var(--accent), var(--accent-dim));
            box-shadow: 0 0 40px var(--accent-glow), 0 0 80px rgba(124,58,237,0.15);
            transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            cursor: pointer; position: relative; z-index: 1;
        }
        .orb.listening {
            width: 140px; height: 140px;
            box-shadow: 0 0 60px var(--accent-glow), 0 0 120px rgba(124,58,237,0.2);
            animation: pulse 1.5s ease-in-out infinite;
        }
        .orb.thinking { animation: spin-glow 2s linear infinite; }
        .orb.speaking { animation: speak-pulse 0.8s ease-in-out infinite; }
        .orb.activated {
            background: radial-gradient(circle at 40% 40%, var(--accent-bright), var(--accent)) !important;
            box-shadow: 0 0 80px var(--accent-bright), 0 0 160px rgba(124,58,237,0.4) !important;
            transform: scale(1.15) !important;
        }
        @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.08); } }
        @keyframes spin-glow { 0% { box-shadow: 0 0 40px var(--accent-glow); } 50% { box-shadow: 0 0 80px var(--accent-glow), 0 0 120px rgba(124,58,237,0.3); } 100% { box-shadow: 0 0 40px var(--accent-glow); } }
        @keyframes speak-pulse { 0%, 100% { transform: scale(1); opacity: 1; } 50% { transform: scale(1.05); opacity: 0.85; } }

        .orb-ring {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 120px; height: 120px; border-radius: 50%;
            border: 1px solid rgba(124,58,237,0.2); pointer-events: none;
        }
        .orb.listening .orb-ring { width: 160px; height: 160px; border-color: rgba(124,58,237,0.4); animation: ring-expand 1.5s ease-in-out infinite; }
        @keyframes ring-expand { 0%, 100% { transform: translate(-50%, -50%) scale(1); opacity: 0.4; } 50% { transform: translate(-50%, -50%) scale(1.15); opacity: 0.1; } }

        /* Status */
        .status-text { font-size: 13px; color: var(--text-secondary); margin-bottom: 8px; font-family: var(--font-mono); text-transform: uppercase; letter-spacing: 1.5px; }
        .transcript { font-size: 15px; color: var(--text-primary); text-align: center; max-width: 600px; min-height: 24px; line-height: 1.5; }
        .response-text { font-size: 14px; color: var(--accent-bright); text-align: center; max-width: 600px; margin-top: 12px; line-height: 1.6; }

        /* Controls */
        .controls { display: flex; gap: 8px; margin-top: 20px; }
        .ctrl-btn {
            padding: 8px 16px; border-radius: 8px; border: 1px solid rgba(124,58,237,0.2);
            background: var(--bg-surface); color: var(--text-secondary); cursor: pointer;
            font-size: 11px; font-family: var(--font-mono); text-transform: uppercase;
            letter-spacing: 0.5px; transition: all 0.2s;
        }
        .ctrl-btn:hover { border-color: var(--accent); color: var(--accent-bright); background: rgba(124,58,237,0.08); }
        .ctrl-btn.active { border-color: var(--accent); color: var(--accent-bright); background: rgba(124,58,237,0.12); }

        /* Conversation log */
        .conversation-panel {
            position: fixed; bottom: 0; left: 0; right: 0;
            max-height: 40vh; background: var(--bg-surface);
            border-top: 1px solid rgba(124,58,237,0.1);
            overflow-y: auto; padding: 12px 16px;
            transform: translateY(100%); transition: transform 0.3s ease;
            z-index: 100;
        }
        .conversation-panel.open { transform: translateY(0); }
        .msg { margin-bottom: 8px; padding: 8px 12px; border-radius: 8px; font-size: 13px; line-height: 1.5; }
        .msg.user { background: rgba(124,58,237,0.08); border-left: 2px solid var(--accent); }
        .msg.assistant { background: rgba(255,255,255,0.03); border-left: 2px solid var(--text-dim); }
        .msg .role { font-size: 10px; font-family: var(--font-mono); text-transform: uppercase; letter-spacing: 1px; color: var(--text-dim); margin-bottom: 4px; }

        /* Tool calls */
        .tool-badge { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 10px; font-family: var(--font-mono); background: rgba(245,158,11,0.15); color: var(--warning); margin: 4px 0; }

        /* Tray status */
        .tray-indicator {
            position: fixed; top: 40px; right: 12px; z-index: 50;
            font-size: 10px; font-family: var(--font-mono); color: var(--text-dim);
            display: flex; align-items: center; gap: 6px;
        }
        .tray-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--success); }
        .tray-dot.offline { background: var(--error); }

        /* Login overlay */
        .login-overlay {
            position: fixed; inset: 0; z-index: 1000;
            display: flex; align-items: center; justify-content: center;
            background: var(--bg-base);
        }
        .login-box {
            width: 340px; padding: 32px;
            background: var(--bg-surface); border: 1px solid rgba(124,58,237,0.15);
            border-radius: 12px;
        }
        .login-box h1 { font-size: 22px; font-weight: 700; text-align: center; margin-bottom: 4px; }
        .login-box .sub { font-size: 11px; color: var(--text-secondary); text-align: center; margin-bottom: 24px; }
        .login-box input {
            width: 100%; padding: 10px 12px; margin-bottom: 12px;
            background: var(--bg-elevated); border: 1px solid rgba(124,58,237,0.15);
            border-radius: 6px; color: var(--text-primary); font-size: 13px;
            outline: none; transition: border-color 0.2s;
        }
        .login-box input:focus { border-color: var(--accent); }
        .login-box button {
            width: 100%; padding: 10px; margin-top: 4px;
            background: var(--accent); color: white; border: none; border-radius: 6px;
            font-size: 13px; font-weight: 600; cursor: pointer; transition: opacity 0.2s;
        }
        .login-box button:hover { opacity: 0.9; }
        .login-box .error { color: var(--error); font-size: 12px; margin-top: 8px; display: none; }
        .login-box .toggle { font-size: 11px; color: var(--text-secondary); text-align: center; margin-top: 16px; cursor: pointer; }
        .login-box .toggle:hover { color: var(--accent-bright); }
    </style>
</head>
<body>
    <!-- Login overlay -->
    <div class="login-overlay" id="login-overlay">
        <div class="login-box">
            <h1>AgentOS</h1>
            <div class="sub">Desktop AI Assistant</div>
            <div id="login-form">
                <input type="email" id="login-email" placeholder="Email" autocomplete="email">
                <input type="password" id="login-password" placeholder="Password" autocomplete="current-password">
                <button onclick="doLogin()">Sign In</button>
                <div class="error" id="login-error"></div>
            </div>
            <div id="register-form" style="display:none">
                <input type="text" id="reg-name" placeholder="Name">
                <input type="email" id="reg-email" placeholder="Email">
                <input type="password" id="reg-password" placeholder="Password">
                <button onclick="doRegister()">Create Account</button>
                <div class="error" id="reg-error"></div>
            </div>
            <div class="toggle" onclick="toggleAuthMode()">Need an account? Register</div>
        </div>
    </div>

    <!-- Main app -->
    <div class="app" id="app" style="display:none">
        <div class="titlebar">
            <div class="titlebar-title">AgentOS</div>
            <div class="titlebar-buttons">
                <button class="titlebar-btn" onclick="minimize()">─</button>
                <button class="titlebar-btn" onclick="maximize()">□</button>
                <button class="titlebar-btn close" onclick="closeWindow()">✕</button>
            </div>
        </div>

        <div class="main-content">
            <div class="tray-indicator">
                <div class="tray-dot" id="backend-dot"></div>
                <span id="backend-status">connecting...</span>
            </div>

            <div class="orb-container">
                <div class="orb-ring"></div>
                <div class="orb" id="orb" onclick="toggleListening()"></div>
            </div>

            <div class="status-text" id="status">IDLE</div>
            <div class="transcript" id="transcript"></div>
            <div class="response-text" id="response"></div>

            <div class="controls">
                <button class="ctrl-btn" id="btn-voice" onclick="toggleListening()">🎤 Voice</button>
                <button class="ctrl-btn" id="btn-tts" onclick="toggleTTS()">🔊 TTS</button>
                <button class="ctrl-btn" onclick="toggleConversation()">💬 Log</button>
            </div>
        </div>

        <div class="conversation-panel" id="conv-panel"></div>
    </div>

    <script>
    // ============================================================
    // State
    // ============================================================
    let token = null;
    let userId = null;
    let sessionId = null;
    let state = 'idle'; // idle, listening, thinking, executing, speaking
    let ttsEnabled = true;
    let backendUrl = 'http://127.0.0.1:8000';
    let ws = null;
    let conversationHistory = [];

    // ============================================================
    // Init
    // ============================================================
    window.addEventListener('DOMContentLoaded', async () => {
        if (window.electronAPI) {
            backendUrl = await window.electronAPI.getBackendUrl();
        }
        token = localStorage.getItem('agentos_token');
        userId = localStorage.getItem('agentos_user_id');

        // Try auto-login first (single-user desktop mode)
        if (token) {
            try {
                const r = await api('GET', '/api/auth/me');
                if (r.user) { showApp(); return; }
            } catch(e) {
                // Token invalid — clear and fall through
                localStorage.removeItem('agentos_token');
                localStorage.removeItem('agentos_user_id');
                token = null; userId = null;
            }
        }

        // Auto-login: try default credentials (user@agentos.local / agentos)
        try {
            const loginR = await api('POST', '/api/auth/login', {
                email: 'user@agentos.local',
                password: 'agentos'
            });
            token = loginR.token; userId = loginR.user.id;
            localStorage.setItem('agentos_token', token);
            localStorage.setItem('agentos_user_id', userId);
            showApp();
            return;
        } catch(e) {
            // Default user doesn't exist yet — try register
        }

        // Auto-register first user
        try {
            const regR = await api('POST', '/api/auth/register', {
                email: 'user@agentos.local',
                password: 'agentos',
                name: 'User'
            });
            token = regR.token; userId = regR.user.id;
            localStorage.setItem('agentos_token', token);
            localStorage.setItem('agentos_user_id', userId);
            showApp();
            return;
        } catch(e) {
            // Registration failed (maybe user already exists) — show login
        }

        showLogin();
    });

    // ============================================================
    // Auth
    // ============================================================
    function showLogin() {
        document.getElementById('login-overlay').style.display = 'flex';
        document.getElementById('app').style.display = 'none';
    }
    function showApp() {
        document.getElementById('login-overlay').style.display = 'none';
        document.getElementById('app').style.display = 'flex';
        connectSocket();
        createSession();
        checkBackend();
    }
    function toggleAuthMode() {
        const login = document.getElementById('login-form');
        const reg = document.getElementById('register-form');
        const toggle = document.querySelector('.toggle');
        if (login.style.display === 'none') {
            login.style.display = 'block'; reg.style.display = 'none';
            toggle.textContent = 'Need an account? Register';
        } else {
            login.style.display = 'none'; reg.style.display = 'block';
            toggle.textContent = 'Already have an account? Sign in';
        }
    }
    async function doLogin() {
        const email = document.getElementById('login-email').value;
        const pass = document.getElementById('login-password').value;
        try {
            const r = await api('POST', '/api/auth/login', { email, password: pass });
            token = r.token; userId = r.user.id;
            localStorage.setItem('agentos_token', token);
            localStorage.setItem('agentos_user_id', userId);
            showApp();
        } catch(e) {
            const el = document.getElementById('login-error');
            el.textContent = e.message; el.style.display = 'block';
        }
    }
    async function doRegister() {
        const name = document.getElementById('reg-name').value;
        const email = document.getElementById('reg-email').value;
        const pass = document.getElementById('reg-password').value;
        try {
            const r = await api('POST', '/api/auth/register', { email, password: pass, name });
            token = r.token; userId = r.user.id;
            localStorage.setItem('agentos_token', token);
            localStorage.setItem('agentos_user_id', userId);
            showApp();
        } catch(e) {
            const el = document.getElementById('reg-error');
            el.textContent = e.message; el.style.display = 'block';
        }
    }

    // ============================================================
    // API helpers
    // ============================================================
    async function api(method, path, body) {
        const opts = { method, headers: { 'Content-Type': 'application/json' } };
        if (token) opts.headers['Authorization'] = `Bearer ${token}`;
        if (body) opts.body = JSON.stringify(body);
        const r = await fetch(`${backendUrl}${path}`, opts);
        const data = await r.json();
        if (!r.ok) throw new Error(data.error || 'Request failed');
        return data;
    }

    async function createSession() {
        try {
            const r = await api('POST', '/api/sessions', {});
            sessionId = r.id;
        } catch(e) { console.error('Session create failed:', e); }
    }

    // ============================================================
    // Socket.IO
    // ============================================================
    function connectSocket() {
        if (ws) return;
        try {
            const script = document.createElement('script');
            script.src = `${backendUrl}/socket.io/socket.io.js`;
            script.onload = () => {
                ws = io(backendUrl, { transports: ['websocket', 'polling'] });
                ws.on('thinking', (d) => { if (d.session_id === sessionId) setState('thinking'); });
                ws.on('tool_call', (d) => { if (d.session_id === sessionId) { setState('executing'); addToolBadge(d.tool_name); }});
                ws.on('tool_result', (d) => { if (d.session_id === sessionId) setState('thinking'); });
                ws.on('response', (d) => {
                    if (d.session_id === sessionId) {
                        setState('idle');
                        document.getElementById('response').textContent = d.response;
                        addMessage('assistant', d.response);
                        if (ttsEnabled && !pythonVoiceActive) speak(d.response);
                    }
                });
                ws.on('error', (d) => { if (d.session_id === sessionId) { setState('idle'); document.getElementById('response').textContent = `Error: ${d.error}`; }});
                ws.on('confirm_request', (d) => {
                    if (d.session_id === sessionId) {
                        if (confirm(`Tool "${d.tool_name}" requires confirmation:\n${d.reason}`)) {
                            api('POST', '/api/chat/confirm', { session_id: sessionId, tool_name: d.tool_name, args: d.args });
                        }
                    }
                });
                // Voice pipeline events from Python backend
                ws.on('voice.wake', () => {
                    if (sessionId) { setState('listening'); document.getElementById('transcript').textContent = 'Listening...'; }
                });
                ws.on('voice.stt', (d) => {
                    if (d.text && d.text.trim()) {
                        document.getElementById('transcript').textContent = d.text;
                        sendMessage(d.text);
                    }
                });
                ws.on('voice.tts_start', () => { setState('speaking'); });
                ws.on('voice.tts_end', () => { setState('idle'); });
                document.getElementById('backend-dot').classList.remove('offline');
                document.getElementById('backend-status').textContent = 'connected';
            };
            document.head.appendChild(script);
        } catch(e) { console.error('Socket connect failed:', e); }
    }

    // ============================================================
    // Backend health check
    // ============================================================
    async function checkBackend() {
        try {
            await fetch(`${backendUrl}/api/developer/status`);
            document.getElementById('backend-dot').classList.remove('offline');
            document.getElementById('backend-status').textContent = 'connected';
        } catch(e) {
            document.getElementById('backend-dot').classList.add('offline');
            document.getElementById('backend-status').textContent = 'offline';
        }
        setTimeout(checkBackend, 5000);
    }

    // ============================================================
    // Voice pipeline (wake word → STT → agent → TTS)
    // ============================================================
    let mediaStream = null;
    let audioContext = null;
    let wakeWordActive = false;
    let pythonVoiceActive = false;
    let recognitionInstance = null;

    async function toggleListening() {
        if (state === 'listening') {
            stopListening();
        } else {
            startListening();
        }
    }

    async function startListening() {
        // Try Python backend voice pipeline first
        try {
            const r = await api('POST', '/api/voice/start', {});
            if (r.status === 'started') {
                pythonVoiceActive = true;
                setState('listening');
                document.getElementById('btn-voice').classList.add('active');
                document.getElementById('transcript').textContent = 'Say "Hey Jarvis" to activate...';
                return;
            }
        } catch(e) {
            // Python voice pipeline not available — fall back to browser
        }

        // Fallback: Web Speech API
        try {
            mediaStream = await navigator.mediaDevices.getUserMedia({ audio: true });
            audioContext = new AudioContext();
            setState('listening');
            document.getElementById('btn-voice').classList.add('active');
            startSpeechRecognition();
        } catch(e) {
            console.error('Mic access denied:', e);
            document.getElementById('transcript').textContent = 'Microphone access denied';
        }
    }

    async function stopListening() {
        if (pythonVoiceActive) {
            try { await api('POST', '/api/voice/stop', {}); } catch(e) {}
            pythonVoiceActive = false;
        }
        if (recognitionInstance) {
            recognitionInstance.onend = null; // Prevent auto-restart
            recognitionInstance.stop();
            recognitionInstance = null;
        }
        if (mediaStream) {
            mediaStream.getTracks().forEach(t => t.stop());
            mediaStream = null;
        }
        document.getElementById('btn-voice').classList.remove('active');
        setState('idle');
    }

    function startSpeechRecognition() {
        if (!('webkitSpeechRecognition' in window || 'SpeechRecognition' in window)) {
            document.getElementById('transcript').textContent = 'Speech recognition not supported';
            return;
        }
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        const recognition = new SpeechRecognition();
        recognition.continuous = true;
        recognition.interimResults = true;
        recognition.lang = 'en-US';

        document.getElementById('transcript').textContent = 'Say "Hey Jarvis" to activate...';
        wakeWordActive = false;

        recognition.onresult = (e) => {
            let interimTranscript = '';
            let finalTranscript = '';

            for (let i = e.resultIndex; i < e.results.length; ++i) {
                if (e.results[i].isFinal) {
                    finalTranscript += e.results[i][0].transcript;
                } else {
                    interimTranscript += e.results[i][0].transcript;
                }
            }

            const currentText = (finalTranscript || interimTranscript).trim();
            const currentLower = currentText.toLowerCase();

            if (!wakeWordActive) {
                if (currentLower.includes('hey jarvis') || currentLower.includes('jarvis')) {
                    wakeWordActive = true;
                    // Flash the orb to indicate activation
                    const orb = document.getElementById('orb');
                    orb.classList.add('activated');
                    setTimeout(() => orb.classList.remove('activated'), 1000);
                    
                    // Extract command if any
                    let command = '';
                    const jarvisIndex = currentLower.indexOf('jarvis');
                    if (jarvisIndex !== -1) {
                        command = currentText.substring(jarvisIndex + 6).trim();
                    }

                    if (command) {
                        document.getElementById('transcript').textContent = command;
                        if (finalTranscript) {
                            sendMessage(command);
                            wakeWordActive = false;
                            document.getElementById('transcript').textContent = 'Say "Hey Jarvis" to activate...';
                        }
                    } else {
                        document.getElementById('transcript').textContent = "I'm listening...";
                    }
                }
            } else {
                // Wake word already active, capture the command
                if (currentText) {
                    document.getElementById('transcript').textContent = currentText;
                }
                if (finalTranscript) {
                    sendMessage(currentText);
                    wakeWordActive = false;
                    document.getElementById('transcript').textContent = 'Say "Hey Jarvis" to activate...';
                }
            }
        };
        recognition.onend = () => { if (state === 'listening') startSpeechRecognition(); };
        recognition.onerror = (e) => { 
            console.error('Speech error:', e); 
            if (e.error !== 'no-speech') {
                stopListening();
            }
        };
        recognition.start();
        recognitionInstance = recognition;
    }

    async function sendMessage(text) {
        if (!sessionId || !text.trim()) return;
        setState('thinking');
        document.getElementById('transcript').textContent = text;
        addMessage('user', text);
        try {
            const r = await api('POST', '/api/chat', { session_id: sessionId, message: text });
            setState('idle');
            document.getElementById('response').textContent = r.response;
            addMessage('assistant', r.response);
            if (ttsEnabled) speak(r.response);
        } catch(e) {
            setState('idle');
            document.getElementById('response').textContent = `Error: ${e.message}`;
        }
    }

    // ============================================================
    // TTS
    // ============================================================
    function speak(text) {
        if (!ttsEnabled || !text) return;
        setState('speaking');
        // Try Python backend TTS first
        api('POST', '/api/voice/speak', { text }).catch(() => {
            // Fallback to browser TTS
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.onend = () => setState('idle');
            utterance.onerror = () => setState('idle');
            speechSynthesis.speak(utterance);
        });
    }

    function toggleTTS() {
        ttsEnabled = !ttsEnabled;
        document.getElementById('btn-tts').classList.toggle('active', ttsEnabled);
        if (!ttsEnabled) speechSynthesis.cancel();
    }

    // ============================================================
    // State machine
    // ============================================================
    function setState(s) {
        state = s;
        const orb = document.getElementById('orb');
        const status = document.getElementById('status');
        orb.className = 'orb ' + s;
        status.textContent = s.toUpperCase();
        if (s === 'idle') { document.getElementById('transcript').textContent = ''; }
    }

    // ============================================================
    // Conversation log
    // ============================================================
    function addMessage(role, content) {
        conversationHistory.push({ role, content });
        const panel = document.getElementById('conv-panel');
        const div = document.createElement('div');
        div.className = `msg ${role}`;
        div.innerHTML = `<div class="role">${role}</div><div>${escapeHtml(content)}</div>`;
        panel.appendChild(div);
        panel.scrollTop = panel.scrollHeight;
    }
    function addToolBadge(name) {
        const panel = document.getElementById('conv-panel');
        const badge = document.createElement('div');
        badge.className = 'tool-badge';
        badge.textContent = `🔧 ${name}`;
        panel.appendChild(badge);
    }
    function toggleConversation() {
        document.getElementById('conv-panel').classList.toggle('open');
    }
    function escapeHtml(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

    // ============================================================
    // Window controls
    // ============================================================
    function minimize() { window.electronAPI && window.electronAPI.minimize(); }
    function maximize() { window.electronAPI && window.electronAPI.maximize(); }
    function closeWindow() { window.electronAPI ? window.electronAPI.close() : window.close(); }

    // ============================================================
    // Keyboard shortcuts
    // ============================================================
    document.addEventListener('keydown', (e) => {
        // Escape: hide window
        if (e.key === 'Escape') { closeWindow(); return; }
        // Space (when not typing): toggle listening
        if (e.key === ' ' && e.target.tagName !== 'INPUT' && e.target.tagName !== 'TEXTAREA') {
            e.preventDefault();
            toggleListening();
        }
        // T: toggle TTS
        if (e.key === 't' && e.target.tagName !== 'INPUT' && e.target.tagName !== 'TEXTAREA') {
            toggleTTS();
        }
        // L: toggle conversation log
        if (e.key === 'l' && e.target.tagName !== 'INPUT' && e.target.tagName !== 'TEXTAREA') {
            toggleConversation();
        }
    });
    </script>
</body>
</html>
