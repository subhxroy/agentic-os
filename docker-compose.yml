services:
  postgres:
    image: pgvector/pgvector:pg16
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: agentos
      POSTGRES_PASSWORD: agentos_dev
      POSTGRES_DB: agentos
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./migrations/init.sql:/docker-entrypoint-initdb.d/01-init.sql
      - ./migrations/002_add_orgs.sql:/docker-entrypoint-initdb.d/02_add_orgs.sql
      - ./migrations/003_phase3.sql:/docker-entrypoint-initdb.d/03_phase3.sql
      - ./migrations/004_phase4.sql:/docker-entrypoint-initdb.d/04-phase4.sql
      - ./migrations/005_phase5.sql:/docker-entrypoint-initdb.d/05_phase5.sql
      - ./migrations/006_phase6.sql:/docker-entrypoint-initdb.d/06-phase6.sql
      - ./migrations/007_phase7.sql:/docker-entrypoint-initdb.d/07-phase7.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agentos"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - phase0/.env
    environment:
      DATABASE_URL: postgresql://agentos:agentos_dev@postgres:5432/agentos
      REDIS_URL: redis://redis:6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./phase0:/app
      - uploads:/app/uploads

volumes:
  pgdata:
  redisdata:
  uploads:
